<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔞 PornNav - 全网精选成人站点导航</title>
<style>
/*========================================
  CSS RESET & VARIABLES
========================================*/
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Dark theme */
  --bg:#07070d;--bg2:#0e0e18;--bg3:#151525;--bg4:#1c1c32;
  --card:#12122a;--card-hover:#1a1a3a;
  --text:#eef0f6;--text2:#a0a8c0;--text3:#606880;
  --border:rgba(120,100,255,.12);
  --radius:12px;--radius-sm:8px;
  --transition:all .28s cubic-bezier(.25,.1,.25,1);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;

  /* Category gradients */
  --g-free:linear-gradient(135deg,#667eea,#764ba2);
  --g-asian:linear-gradient(135deg,#f093fb,#f5576c);
  --g-tiktok:linear-gradient(135deg,#4facfe,#00f2fe);
  --g-pics:linear-gradient(135deg,#43e97b,#38f9d7);
  --g-soft:linear-gradient(135deg,#fa709a,#fee140);
  --g-search:linear-gradient(135deg,#a18cd1,#fbc2eb);
  --g-premium:linear-gradient(135deg,#f7971e,#ffd200);
  --g-amateur:linear-gradient(135deg,#e44d26,#f16529);
  --g-cam:linear-gradient(135deg,#ff0844,#ffb199);
  --g-voyeur:linear-gradient(135deg,#b721ff,#21d4fd);
  --g-chat:linear-gradient(135deg,#08aeea,#2af598);
  --g-vr:linear-gradient(135deg,#0061ff,#60efff);
  --g-ai:linear-gradient(135deg,#00c9ff,#92fe9d);
  --g-anime:linear-gradient(135deg,#f953c6,#b91d73);
  --g-games:linear-gradient(135deg,#7f00ff,#e100ff);
  --g-gay:linear-gradient(135deg,#ff6a00,#ee0979);
  --g-trans:linear-gradient(135deg,#55cdfc,#f7a8b8);
  --g-fetish:linear-gradient(135deg,#434343,#dc2430);
  --g-forum:linear-gradient(135deg,#11998e,#38ef7d);
  --g-shop:linear-gradient(135deg,#f12711,#f5af19);
  --g-dating:linear-gradient(135deg,#fc5c7d,#6a82fb);
  --g-erotica:linear-gradient(135deg,#c471f5,#fa71cd);
  --g-wiki:linear-gradient(135deg,#ffecd2,#fcb69f);
}

[data-theme="light"]{
  --bg:#f0f2f8;--bg2:#e8eaf2;--bg3:#dde0eb;--bg4:#d0d4e2;
  --card:#ffffff;--card-hover:#f5f6fc;
  --text:#1a1a2e;--text2:#4a4e69;--text3:#8a8ea2;
  --border:rgba(100,80,200,.15);
}

html{scroll-behavior:smooth;font-size:16px;scroll-padding-top:70px}
body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  line-height:1.6;overflow-x:hidden;transition:background .5s,color .5s;
}
a{color:inherit;text-decoration:none}

/* Rainbow scroll progress */
#scrollProgress{
  position:fixed;top:0;left:0;height:3px;z-index:10000;
  background:linear-gradient(90deg,#ff0000,#ff8000,#ffff00,#00ff00,#0080ff,#8000ff,#ff0080);
  background-size:200% 100%;
  width:0;transition:width .1s linear;
  animation:rainbowShift 3s linear infinite;
}
@keyframes rainbowShift{0%{background-position:0% 0}100%{background-position:200% 0}}

/* Custom scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{
  background:linear-gradient(180deg,#667eea,#764ba2,#f093fb);
  border-radius:4px;
}

/* Grid background */
#gridBg{
  position:fixed;inset:0;z-index:-2;pointer-events:none;
  background-image:
    linear-gradient(rgba(100,126,234,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(100,126,234,.04) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridFloat 20s linear infinite;
}
[data-theme="light"] #gridBg{
  background-image:
    linear-gradient(rgba(100,80,200,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(100,80,200,.06) 1px,transparent 1px);
}
@keyframes gridFloat{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}

/* Particle canvas */
#particleCanvas{position:fixed;inset:0;z-index:-1;pointer-events:none}

/*========================================
  NSFW WARNING
========================================*/
.nsfw-overlay{
  position:fixed;inset:0;z-index:99999;
  background:rgba(7,7,13,.97);backdrop-filter:blur(30px);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .6s ease;
}
.nsfw-overlay.hidden{opacity:0;pointer-events:none}
.nsfw-box{
  text-align:center;max-width:440px;padding:48px 36px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.nsfw-box .icon{font-size:4rem;margin-bottom:16px;display:block}
.nsfw-box h2{
  font-size:1.8rem;font-weight:800;margin-bottom:12px;
  background:linear-gradient(135deg,#ff6b6b,#feca57);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nsfw-box p{color:var(--text2);font-size:.95rem;margin-bottom:28px;line-height:1.7}
.nsfw-enter{
  padding:14px 48px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-size:1.05rem;font-weight:700;cursor:pointer;
  transition:var(--transition);letter-spacing:.5px;
}
.nsfw-enter:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(102,126,234,.4)}
.nsfw-leave{
  display:block;margin-top:16px;color:var(--text3);font-size:.85rem;
  cursor:pointer;transition:color .3s;
}
.nsfw-leave:hover{color:var(--text)}

/*========================================
  TOP BAR (sticky search + controls)
========================================*/
.topbar{
  position:sticky;top:0;z-index:1000;
  background:rgba(7,7,13,.8);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:10px 20px;transition:background .5s;
}
[data-theme="light"] .topbar{background:rgba(240,242,248,.85)}
.topbar-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;gap:12px;
}
.topbar-logo{
  font-size:1.3rem;font-weight:800;white-space:nowrap;
  background:linear-gradient(135deg,#667eea,#f093fb);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  cursor:pointer;flex-shrink:0;
}
.search-box{
  flex:1;max-width:500px;position:relative;
}
.search-box input{
  width:100%;padding:10px 16px 10px 40px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:50px;color:var(--text);font-size:.9rem;
  outline:none;transition:var(--transition);
}
.search-box input:focus{
  border-color:rgba(102,126,234,.5);
  box-shadow:0 0 20px rgba(102,126,234,.15);
}
.search-box .icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:.9rem;pointer-events:none;
}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.theme-btn{
  width:40px;height:40px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg3);color:var(--text);font-size:1.1rem;
  cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;
}
.theme-btn:hover{background:var(--bg4);transform:scale(1.1)}
.stats-pill{
  padding:6px 14px;border-radius:20px;font-size:.75rem;font-weight:600;
  background:linear-gradient(135deg,rgba(102,126,234,.15),rgba(240,147,251,.15));
  color:var(--text2);white-space:nowrap;border:1px solid var(--border);
}

/*========================================
  HERO SECTION
========================================*/
.hero{
  position:relative;padding:80px 20px 60px;text-align:center;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(102,126,234,.15),transparent 50%),
    radial-gradient(ellipse at 80% 50%,rgba(240,147,251,.15),transparent 50%),
    radial-gradient(ellipse at 50% 90%,rgba(0,201,255,.08),transparent 40%);
  animation:heroBreathe 10s ease-in-out infinite alternate;
}
@keyframes heroBreathe{
  0%{opacity:.6;transform:scale(1) rotate(0deg)}
  50%{opacity:1;transform:scale(1.02) rotate(.5deg)}
  100%{opacity:.7;transform:scale(.98) rotate(-.5deg)}
}
.hero-content{position:relative;z-index:1}
.hero h1{
  font-size:clamp(2.2rem,6vw,4rem);font-weight:900;
  background:linear-gradient(135deg,#667eea 0%,#f093fb 30%,#00c9ff 60%,#92fe9d 100%);
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:gradientFlow 6s ease infinite;
  letter-spacing:-1px;
}
@keyframes gradientFlow{
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}
.hero p{
  font-size:clamp(1rem,2.5vw,1.2rem);color:var(--text2);
  margin-top:12px;max-width:600px;margin-left:auto;margin-right:auto;
}
.hero-stats{
  display:flex;gap:40px;justify-content:center;margin-top:32px;flex-wrap:wrap;
}
.hero-stat{text-align:center}
.hero-stat .num{
  font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;
  background:linear-gradient(135deg,#667eea,#f093fb);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-stat .label{font-size:.8rem;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:1px}

/*========================================
  MAIN LAYOUT (Sidebar + Content)
========================================*/
.main-layout{
  display:flex;max-width:1200px;margin:0 auto;
  position:relative;padding:0 20px 60px;
}

/* Sidebar */
.sidebar{
  width:220px;flex-shrink:0;position:sticky;top:62px;
  height:calc(100vh - 62px);overflow-y:auto;
  padding:20px 0 20px 0;margin-right:24px;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--text3);border-radius:2px}
.sidebar-title{
  font-size:.65rem;text-transform:uppercase;letter-spacing:2.5px;
  color:var(--text3);padding:0 12px 8px;font-weight:700;
}
.sidebar-link{
  display:flex;align-items:center;gap:8px;
  padding:7px 12px;border-radius:var(--radius-sm);
  color:var(--text3);font-size:.82rem;font-weight:500;
  cursor:pointer;transition:var(--transition);
  border-left:2px solid transparent;margin-bottom:1px;
}
.sidebar-link:hover{color:var(--text);background:rgba(102,126,234,.06)}
.sidebar-link.active{
  color:var(--text);background:rgba(102,126,234,.1);
  border-left-color:#667eea;
}
.sidebar-link .emoji{font-size:.95rem;width:22px;text-align:center;flex-shrink:0}
.sidebar-link .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-link .cnt{
  font-size:.65rem;color:var(--text3);
  background:rgba(102,126,234,.1);padding:1px 6px;border-radius:8px;
}
.sidebar-sep{height:12px}

/* Content area */
.content{flex:1;min-width:0}

/*========================================
  CATEGORY SECTIONS (ThePornDude style)
========================================*/
.cat-section{
  margin-bottom:40px;
  opacity:0;transform:translateY(24px);
  transition:opacity .5s ease,transform .5s ease;
}
.cat-section.visible{opacity:1;transform:translateY(0)}

/* Category header bar */
.cat-header{
  display:flex;align-items:center;gap:12px;
  padding:14px 20px;border-radius:var(--radius);
  margin-bottom:2px;position:relative;overflow:hidden;
  cursor:default;
}
.cat-header::before{
  content:'';position:absolute;inset:0;opacity:.12;
  transition:opacity .3s;
}
.cat-header:hover::before{opacity:.18}
.cat-header .emoji{font-size:1.5rem;position:relative;z-index:1;filter:drop-shadow(0 0 8px rgba(255,255,255,.3))}
.cat-header .title{
  font-size:1.15rem;font-weight:800;position:relative;z-index:1;
  letter-spacing:.3px;
}
.cat-header .title .neon{
  text-shadow:0 0 10px currentColor,0 0 20px currentColor;
  animation:neonPulse 3s ease-in-out infinite alternate;
}
@keyframes neonPulse{0%{opacity:.85}100%{opacity:1}}
.cat-header .count-badge{
  margin-left:auto;padding:4px 12px;border-radius:20px;
  font-size:.75rem;font-weight:700;position:relative;z-index:1;
  background:rgba(255,255,255,.15);backdrop-filter:blur(4px);
}

/* Site rows (TPD-style horizontal bars) */
.site-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  transition:var(--transition);
  position:relative;overflow:hidden;
  cursor:pointer;
}
.site-row:last-child{border-bottom:none;border-radius:0 0 var(--radius) var(--radius)}
.site-row:first-child{border-radius:0}
.site-row::before{
  content:'';position:absolute;inset:0;opacity:0;
  transition:opacity .3s;pointer-events:none;
}
.site-row:hover{
  background:var(--card-hover);
  transform:translateX(4px);
  z-index:2;
}
.site-row:hover::before{opacity:.04}

/* Electric border on hover */
.site-row::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  opacity:0;transition:opacity .3s;
}
.site-row:hover::after{opacity:1}

/* Rank number */
.site-rank{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:800;flex-shrink:0;
  background:var(--bg3);color:var(--text2);
  transition:var(--transition);
}
.site-row:hover .site-rank{
  transform:scale(1.15);
}
.site-rank.top3{
  background:linear-gradient(135deg,#ffd700,#ffaa00);
  color:#1a1a2e;
}

/* Site icon */
.site-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;font-weight:800;color:#fff;flex-shrink:0;
  transition:var(--transition);
}
.site-row:hover .site-icon{transform:scale(1.1) rotate(-3deg)}

/* Site name */
.site-name{
  font-size:.95rem;font-weight:700;white-space:nowrap;
  min-width:110px;max-width:160px;flex-shrink:0;
  transition:color .3s;
}
.site-row:hover .site-name{color:#667eea}
[data-theme="light"] .site-row:hover .site-name{color:#5b4fc4}

/* Stars */
.site-stars{display:flex;gap:1px;flex-shrink:0}
.site-stars .s{font-size:.75rem;transition:transform .2s}
.site-stars .s.on{color:#fbbf24}
.site-stars .s.off{color:var(--text3);opacity:.4}
.site-row:hover .site-stars .s.on{animation:starTwinkle .4s ease forwards}
@keyframes starTwinkle{
  0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}
}

/* Description */
.site-desc{
  flex:1;font-size:.82rem;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;
}

/* Tags */
.site-tags{display:flex;gap:4px;flex-shrink:0;flex-wrap:nowrap}
.tag{
  font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:600;
  white-space:nowrap;letter-spacing:.3px;
}
.tag-免费{background:rgba(34,197,94,.12);color:#22c55e}
.tag-付费{background:rgba(234,179,8,.12);color:#eab308}
.tag-中文{background:rgba(6,182,212,.12);color:#06b6d4}
.tag-热门{background:rgba(239,68,68,.12);color:#ef4444}
.tag-VR{background:rgba(102,126,234,.12);color:#667eea}
.tag-AI{background:rgba(0,201,255,.12);color:#00c9ff}
.tag-直播{background:rgba(249,115,22,.12);color:#f97316}
[data-theme="light"] .tag-免费{background:rgba(34,197,94,.1);color:#16a34a}
[data-theme="light"] .tag-付费{background:rgba(234,179,8,.1);color:#ca8a04}

/* Badge (hot/new/top) */
.badge{
  font-size:.6rem;padding:2px 6px;border-radius:4px;font-weight:800;
  letter-spacing:.5px;animation:badgePulse 2s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes badgePulse{0%,100%{opacity:1}50%{opacity:.7}}
.badge-hot{background:rgba(239,68,68,.15);color:#ef4444}
.badge-new{background:rgba(34,197,94,.15);color:#22c55e}
.badge-top{background:rgba(234,179,8,.15);color:#eab308}

/* Visit button */
.site-visit{
  padding:6px 16px;border-radius:20px;font-size:.72rem;font-weight:700;
  color:#fff;white-space:nowrap;flex-shrink:0;
  opacity:0;transform:translateX(8px);
  transition:var(--transition);letter-spacing:.3px;
}
.site-row:hover .site-visit{opacity:1;transform:translateX(0)}

/* Tooltip */
.site-row .tooltip{
  position:absolute;left:50%;bottom:100%;transform:translateX(-50%) translateY(4px);
  background:var(--bg4);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;font-size:.78rem;color:var(--text2);
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s;
  z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.site-row:hover .tooltip{opacity:1;transform:translateX(-50%) translateY(-4px)}

/*========================================
  MOBILE SIDEBAR
========================================*/
.mobile-toggle{
  display:none;position:fixed;bottom:24px;right:24px;z-index:2000;
  width:52px;height:52px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-size:1.3rem;cursor:pointer;
  box-shadow:0 4px 20px rgba(102,126,234,.4);
  transition:var(--transition);
}
.mobile-toggle:hover{transform:scale(1.1)}
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1499;
}

/* Back to top */
.back-top{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  padding:10px 24px;border-radius:30px;border:1px solid var(--border);
  background:var(--bg3);backdrop-filter:blur(12px);
  color:var(--text);font-size:.82rem;font-weight:600;
  cursor:pointer;transition:var(--transition);z-index:90;opacity:0;
}
.back-top.show{transform:translateX(-50%) translateY(0);opacity:1}
.back-top:hover{background:var(--bg4)}

/* Footer */
.footer{
  text-align:center;padding:48px 20px;
  border-top:1px solid var(--border);
  color:var(--text3);font-size:.82rem;
  background:var(--bg2);
}
.footer a{color:var(--text2);transition:color .3s}
.footer a:hover{color:var(--text)}
.footer .heart{color:#ef4444;display:inline-block;animation:heartbeat 1.5s ease infinite}
@keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/*========================================
  RESPONSIVE
========================================*/
@media(max-width:1024px){
  .site-desc{display:none}
  .site-name{max-width:140px}
}
@media(max-width:768px){
  .sidebar{
    position:fixed;left:-280px;top:0;height:100vh;z-index:1500;
    width:260px;background:var(--bg);
    border-right:1px solid var(--border);
    transition:left .3s ease;padding-top:70px;margin-right:0;
  }
  .sidebar.open{left:0}
  .sidebar-overlay.open{display:block}
  .mobile-toggle{display:flex;align-items:center;justify-content:center}
  .main-layout{padding:0 12px 60px}
  .content{padding:0}
  .cat-header{padding:12px 14px}
  .site-row{padding:10px 14px;gap:8px}
  .site-name{min-width:80px;max-width:120px;font-size:.85rem}
  .site-tags{display:none}
  .site-visit{opacity:1;transform:none;padding:5px 12px;font-size:.65rem}
  .hero{padding:50px 16px 40px}
  .hero-stats{gap:20px}
  .topbar-inner{gap:8px}
  .stats-pill{display:none}
  .site-desc{display:none}
}
@media(max-width:480px){
  .hero h1{font-size:1.8rem}
  .hero-stat .num{font-size:1.5rem}
  .site-stars{display:none}
  .site-icon{width:30px;height:30px;font-size:.8rem;border-radius:8px}
  .site-rank{width:24px;height:24px;font-size:.6rem}
}

/*========================================
  HIGHLIGHT FLASH
========================================*/
@keyframes highlightFlash{
  0%,100%{box-shadow:none}
  50%{box-shadow:inset 0 0 20px rgba(102,126,234,.15),0 0 12px rgba(102,126,234,.2)}
}
.site-row.flash{animation:highlightFlash 1.5s ease}

/*========================================
  KONAMI PARTY
========================================*/
@keyframes partyBg{
  0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}
}
.party-mode{animation:partyBg 2s linear infinite}
.party-mode *{animation-duration:.5s!important}

/*========================================
  THEME TRANSITION
========================================*/
.theme-transitioning,.theme-transitioning *{transition-duration:.5s!important}

/*========================================
  COUNTING ANIMATION
========================================*/
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.count-anim{animation:countUp .6s ease forwards}
</style>
</head>
<body>

<!-- Rainbow scroll progress bar -->
<div id="scrollProgress"></div>

<!-- Grid background -->
<div id="gridBg"></div>

<!-- Particle canvas -->
<canvas id="particleCanvas"></canvas>

<!-- NSFW Warning -->
<div class="nsfw-overlay" id="nsfwOverlay">

function renderStars(n){
  let s='';
  for(let i=1;i<=5;i++) s+=`<span class="s ${i<=n?'on':'off'}">${i<=n?'★':'☆'}</span>`;
  return s;
}

function renderContent(filter=''){
  const main=document.getElementById('content');
  let html='';
  const q=filter.toLowerCase();

  CATEGORIES.forEach(g=>{
    g.cats.forEach(c=>{
      const filtered=c.sites.filter(s=>{
        if(!q) return true;
        return s.name.toLowerCase().includes(q)||s.desc.includes(q)||c.name.includes(q)||s.tags.some(t=>t.includes(q));
      });
      if(!filtered.length) return;

      html+=`<section class="cat-section" id="${c.id}">`;
      // Header with category gradient
      html+=`<div class="cat-header" style="background:${c.gradient}">
        <span class="emoji">${c.emoji}</span>
        <span class="title"><span class="neon">${c.name}</span></span>
        <span class="count-badge">${filtered.length} 个站点</span>
      </div>`;

      // Site rows
      filtered.forEach((s,idx)=>{
        const rank=idx+1;
        const rankClass=rank<=3?'top3':'';
        const badgeHtml=s.badge?`<span class="badge badge-${s.badge}">${s.badge==='hot'?'🔥热门':s.badge==='new'?'⚡新增':'👑TOP'}</span>`:'';
        const initial=s.name.replace(/^(the|www\.)/i,'').charAt(0).toUpperCase();

        html+=`<a href="${s.url}" target="_blank" rel="noopener noreferrer" class="site-row" style="--cat-color:${c.color}" data-name="${s.name}">
          <span class="site-rank ${rankClass}">${rank}</span>
          <span class="site-icon" style="background:${c.gradient}">${initial}</span>
          <span class="site-name">${s.name}</span>
          <span class="site-stars">${renderStars(s.rating)}</span>
          <span class="site-desc">${s.desc}</span>
          <span class="site-tags">${s.tags.map(t=>`<span class="tag tag-${t}">${t}</span>`).join('')}</span>
          ${badgeHtml}
          <span class="site-visit" style="background:${c.gradient}">访问 →</span>
          <span class="tooltip">🔗 ${s.name} — ${s.desc}</span>
        </a>`;
      });

      html+=`</section>`;
    });
  });

  if(!html){
    html=`<div style="text-align:center;padding:100px 20px;color:var(--text3)">
      <p style="font-size:3rem;margin-bottom:16px">🔍</p>
      <p style="font-size:1.1rem">没有找到匹配「${filter}」的站点</p>
    </div>`;
  }

  main.innerHTML=html;
  observeSections();
}

// Scroll: progress bar, back-to-top, active sidebar
window.addEventListener('scroll',()=>{
  // Progress bar
  const scrolled=window.scrollY;
  const docH=document.documentElement.scrollHeight-window.innerHeight;
  const pct=docH>0?(scrolled/docH)*100:0;
  document.getElementById('scrollProgress').style.width=pct+'%';

  // Back to top
  document.getElementById('backTop').classList.toggle('show',scrolled>600);

  // Active sidebar
  const sections=document.querySelectorAll('.cat-section');
  const links=document.querySelectorAll('.sidebar-link');
  let currentId='';
  sections.forEach(s=>{
    if(s.getBoundingClientRect().top<=120) currentId=s.id;
  });
  links.forEach(l=>{
    l.classList.toggle('active',l.getAttribute('href')==='#'+currentId);
  });
},{passive:true});

// IntersectionObserver for section fade-in
function observeSections(){
  const sections=document.querySelectorAll('.cat-section');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting) e.target.classList.add('visible');
    });
  },{threshold:0.03,rootMargin:'0px 0px -30px 0px'});
  sections.forEach(s=>obs.observe(s));
}

// ================================================
// COUNTING ANIMATION
// ================================================
function animateCount(el,target,duration=1200){
  const start=performance.now();
  const from=0;
  function step(now){
    const progress=Math.min((now-start)/duration,1);
    const eased=1-Math.pow(1-progress,3);
    el.textContent=Math.round(from+(target-from)*eased);
    if(progress<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ================================================
// PARTICLES (mouse-following + ambient)
// ================================================
function initParticles(){
  const canvas=document.getElementById('particleCanvas');
  const ctx=canvas.getContext('2d');
  let W,H;
  const particles=[];
  const colors=['#667eea','#f093fb','#00c9ff','#92fe9d','#fa709a','#ffd200','#ff0844'];
  let mouseX=-1000,mouseY=-1000;

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  }
  resize();
  window.addEventListener('resize',resize);

  // Ambient particles
  for(let i=0;i<40;i++){
    particles.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
      r:Math.random()*2+.5,
      color:colors[Math.floor(Math.random()*colors.length)],
      alpha:Math.random()*.3+.1,
      type:'ambient'
    });
  }

  // Mouse particles
  document.addEventListener('mousemove',e=>{
    mouseX=e.clientX;mouseY=e.clientY;
    if(Math.random()>.7){
      particles.push({
        x:e.clientX,y:e.clientY,
        vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,
        r:Math.random()*3+1,
        color:colors[Math.floor(Math.random()*colors.length)],
        alpha:.6,life:1,type:'mouse'
      });
    }
  });

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx;p.y+=p.vy;

      if(p.type==='mouse'){
        p.life-=.015;p.alpha=p.life*.6;
        if(p.life<=0){particles.splice(i,1);continue;}
      } else {
        // Ambient: wrap around
        if(p.x<0) p.x=W;if(p.x>W) p.x=0;
        if(p.y<0) p.y=H;if(p.y>H) p.y=0;
        // Subtle pulse
        p.alpha=.1+Math.sin(Date.now()*.001+i)*.08;
      }

      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;
      ctx.globalAlpha=Math.max(0,p.alpha);
      ctx.fill();
    }
    ctx.globalAlpha=1;

    // Limit mouse particles
    const mouseP=particles.filter(p=>p.type==='mouse');
    if(mouseP.length>60){
      const excess=mouseP.length-60;
      let removed=0;
      for(let i=particles.length-1;i>=0&&removed<excess;i--){
        if(particles[i].type==='mouse'){particles.splice(i,1);removed++;}
      }
    }

    requestAnimationFrame(draw);
  }
  draw();
}
