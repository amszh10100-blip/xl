*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;
  --card:#16162a;--card-hover:#1e1e3a;
  --purple:#a855f7;--pink:#ec4899;--cyan:#06b6d4;
  --grad:linear-gradient(135deg,#a855f7,#ec4899);
  --grad2:linear-gradient(135deg,#06b6d4,#a855f7);
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --radius:16px;--radius-sm:10px;
  --glow:0 0 20px rgba(168,85,247,.3),0 0 40px rgba(236,72,153,.15);
  --transition:all .3s cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth;font-size:16px}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  line-height:1.6;overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--purple),var(--pink));border-radius:4px}

/* Hero */
.hero{
  position:relative;min-height:340px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:60px 20px 40px;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 50%,rgba(168,85,247,.2),transparent 60%),
             radial-gradient(ellipse at 70% 50%,rgba(236,72,153,.2),transparent 60%),
             radial-gradient(ellipse at 50% 80%,rgba(6,182,212,.1),transparent 50%);
  animation:heroPulse 8s ease-in-out infinite alternate;
}
@keyframes heroPulse{
  0%{opacity:.7;transform:scale(1)}
  100%{opacity:1;transform:scale(1.05)}
}
.hero-title{
  font-size:clamp(2rem,6vw,3.5rem);font-weight:800;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;position:relative;z-index:1;
}
.hero-sub{
  font-size:clamp(1rem,2.5vw,1.25rem);color:var(--text2);
  margin-top:12px;position:relative;z-index:1;
}
.hero-stats{
  display:flex;gap:30px;margin-top:24px;position:relative;z-index:1;
}
.hero-stat{text-align:center}
.hero-stat .num{
  font-size:2rem;font-weight:800;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero-stat .label{font-size:.85rem;color:var(--text3)}

/* Search */
.search-wrap{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,15,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(168,85,247,.15);
  padding:12px 20px;
}
.search-inner{max-width:700px;margin:0 auto;position:relative}
.search-input{
  width:100%;padding:12px 20px 12px 48px;
  background:var(--bg3);border:1px solid rgba(168,85,247,.3);
  border-radius:50px;color:var(--text);font-size:1rem;
  outline:none;transition:var(--transition);
}
.search-input:focus{border-color:var(--purple);box-shadow:0 0 20px rgba(168,85,247,.2)}
.search-icon{
  position:absolute;left:18px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:1.1rem;pointer-events:none;
}

/* Layout */
.main-layout{
  display:flex;max-width:1440px;margin:0 auto;
  min-height:100vh;position:relative;
}

/* Sidebar */
.sidebar{
  width:260px;position:sticky;top:56px;height:calc(100vh - 56px);
  overflow-y:auto;padding:20px 12px;flex-shrink:0;
  background:rgba(18,18,26,.6);backdrop-filter:blur(10px);
  border-right:1px solid rgba(168,85,247,.1);
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px}
.sidebar-group{margin-bottom:20px}
.sidebar-group-title{
  font-size:.7rem;text-transform:uppercase;letter-spacing:2px;
  color:var(--text3);padding:8px 12px 4px;font-weight:600;
}
.sidebar-link{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:var(--radius-sm);
  color:var(--text2);font-size:.9rem;cursor:pointer;
  transition:var(--transition);
}
.sidebar-link:hover,.sidebar-link.active{
  background:rgba(168,85,247,.12);color:var(--text);
}
.sidebar-link .emoji{font-size:1.1rem;width:24px;text-align:center}
.sidebar-link .count{
  margin-left:auto;font-size:.75rem;
  background:rgba(168,85,247,.2);padding:2px 8px;border-radius:10px;
  color:var(--purple);
}

/* Content */
.content{flex:1;padding:24px;min-width:0}

/* Category Section */
.category-section{margin-bottom:48px;opacity:0;transform:translateY(30px);transition:opacity .6s,transform .6s}
.category-section.visible{opacity:1;transform:translateY(0)}
.category-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;padding-bottom:12px;
  border-bottom:1px solid rgba(168,85,247,.15);
}
.category-emoji{font-size:1.8rem}
.category-title{font-size:1.4rem;font-weight:700;color:var(--text)}
.category-count{
  font-size:.8rem;padding:3px 10px;border-radius:20px;
  background:rgba(168,85,247,.15);color:var(--purple);margin-left:auto;
}

/* Cards Grid */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}

/* Site Card */
.site-card{
  background:rgba(22,22,42,.7);backdrop-filter:blur(12px);
  border:1px solid rgba(168,85,247,.1);border-radius:var(--radius);
  padding:20px;cursor:pointer;position:relative;overflow:hidden;
  transition:var(--transition);
}
.site-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(168,85,247,.05),rgba(236,72,153,.05));
  opacity:0;transition:opacity .3s;
}
.site-card:hover{
  transform:translateY(-4px);
  border-color:rgba(168,85,247,.4);
  box-shadow:var(--glow);
}
.site-card:hover::before{opacity:1}
.card-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;position:relative;z-index:1}
.card-icon{
  width:44px;height:44px;border-radius:12px;
  background:var(--grad);display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:700;color:#fff;flex-shrink:0;
}
.card-info{flex:1;min-width:0}
.card-name{font-size:1.05rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-rating{display:flex;gap:2px;margin-top:2px}
.star{color:#fbbf24;font-size:.85rem}
.star.empty{color:var(--text3)}
.card-desc{
  font-size:.85rem;color:var(--text2);line-height:1.5;
  margin-bottom:12px;position:relative;z-index:1;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:relative;z-index:1}
.tag{
  font-size:.7rem;padding:3px 8px;border-radius:6px;font-weight:500;
}
.tag-free{background:rgba(34,197,94,.15);color:#22c55e}
.tag-paid{background:rgba(234,179,8,.15);color:#eab308}
.tag-cn{background:rgba(6,182,212,.15);color:#06b6d4}
.tag-hot{background:rgba(239,68,68,.15);color:#ef4444}
.tag-vr{background:rgba(168,85,247,.15);color:#a855f7}
.tag-ai{background:rgba(236,72,153,.15);color:#ec4899}
.tag-live{background:rgba(249,115,22,.15);color:#f97316}
.card-visit{
  margin-left:auto;padding:6px 14px;border-radius:20px;
  background:var(--grad);color:#fff;font-size:.75rem;font-weight:600;
  opacity:0;transform:translateX(10px);transition:var(--transition);
  white-space:nowrap;
}
.site-card:hover .card-visit{opacity:1;transform:translateX(0)}

/* Mobile sidebar toggle */
.mobile-toggle{
  display:none;position:fixed;bottom:20px;right:20px;z-index:200;
  width:56px;height:56px;border-radius:50%;border:none;
  background:var(--grad);color:#fff;font-size:1.5rem;
  cursor:pointer;box-shadow:0 4px 20px rgba(168,85,247,.4);
}
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:149;
}

/* Back to top */
.back-top{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  padding:10px 20px;border-radius:30px;border:none;
  background:var(--grad);color:#fff;font-size:.9rem;font-weight:600;
  cursor:pointer;transition:var(--transition);z-index:90;opacity:0;
}
.back-top.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Footer */
.footer{
  text-align:center;padding:40px 20px;
  border-top:1px solid rgba(168,85,247,.1);color:var(--text3);font-size:.85rem;
}

/* Responsive */
@media(max-width:1024px){
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
}
@media(max-width:768px){
  .sidebar{
    position:fixed;left:-280px;top:0;height:100vh;z-index:150;
    width:280px;transition:left .3s;padding-top:70px;
    background:rgba(10,10,15,.98);
  }
  .sidebar.open{left:0}
  .sidebar-overlay.open{display:block}
  .mobile-toggle{display:flex;align-items:center;justify-content:center}
  .content{padding:16px}
  .cards-grid{grid-template-columns:1fr}
  .hero{min-height:260px;padding:40px 16px 30px}
  .card-visit{opacity:1;transform:none}
}
@media(max-width:480px){
  .hero-stats{gap:16px}
  .hero-stat .num{font-size:1.5rem}
}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeUp .5s ease-out forwards}

/* NSFW Warning Overlay */
.nsfw-warning{
  position:fixed;inset:0;z-index:9999;
  background:rgba(10,10,15,.98);backdrop-filter:blur(20px);

.nsfw-warning.hidden{opacity:0;pointer-events:none}
.nsfw-box{

.nsfw-box p{color:var(--text2);margin-bottom:24px;font-size:.95rem}
.nsfw-btn{

  background:var(--grad);color:#fff;font-size:1.05rem;font-weight:600;
  cursor:pointer;transition:var(--transition);
}
.nsfw-btn:hover{box-shadow:var(--glow);transform:scale(1.05)}
.nsfw-exit{
  display:block;margin-top:16px;color:var(--text3);font-size:.85rem;
  cursor:pointer;transition:color .3s;
}
.nsfw-exit:hover{color:var(--text)}
</style>

// ============ RENDER ============
function getTagClass(tag){
  const map = {'免费':'tag-free','付费':'tag-paid','中文':'tag-cn','热门':'tag-hot','VR':'tag-vr','AI':'tag-ai','直播':'tag-live'};
  return map[tag] || 'tag-free';
}

function renderStars(n){
  let s = '';
  for(let i=1;i<=5;i++) s += `<span class="star${i>n?' empty':''}">${i<=n?'★':'☆'}</span>`;
  return s;
}

function getInitial(name){
  return name.replace(/^(the|www\.)/i,'').charAt(0).toUpperCase();
}

let totalSites = 0;
let totalCats = 0;

// Sidebar
function renderSidebar(){
  const sb = document.getElementById('sidebar');
  let html = '';
  CATEGORIES.forEach(g => {
    html += `<div class="sidebar-group"><div class="sidebar-group-title">${g.group}</div>`;
    g.cats.forEach(c => {
      totalCats++;
      const count = c.sites.length;
      totalSites += count;
      html += `<a class="sidebar-link" href="#${c.id}" onclick="closeSidebar()">
        <span class="emoji">${c.emoji}</span><span>${c.name}</span>
        <span class="count">${count}</span></a>`;
    });
    html += `</div>`;
  });
  sb.innerHTML = html;
}

// Content
function renderContent(filter=''){
  const main = document.getElementById('content');
  let html = '';
  const q = filter.toLowerCase();
  CATEGORIES.forEach(g => {
    g.cats.forEach(c => {
      const filtered = c.sites.filter(s => {
        if(!q) return true;
        return s.name.toLowerCase().includes(q) || s.desc.includes(q) || c.name.includes(q) || s.tags.some(t=>t.includes(q));
      });
      if(filtered.length === 0) return;
      html += `<section class="category-section" id="${c.id}">
        <div class="category-header">
          <span class="category-emoji">${c.emoji}</span>
          <h2 class="category-title">${c.name}</h2>
          <span class="category-count">${filtered.length} 个站点</span>
        </div>
        <div class="cards-grid">`;
      filtered.forEach(s => {
        html += `<a href="${s.url}" target="_blank" rel="noopener noreferrer" class="site-card">
          <div class="card-top">
            <div class="card-icon">${getInitial(s.name)}</div>
            <div class="card-info">
              <div class="card-name">${s.name}</div>
              <div class="card-rating">${renderStars(s.rating)}</div>
            </div>
          </div>
          <div class="card-desc">${s.desc}</div>
          <div class="card-footer">
            ${s.tags.map(t=>`<span class="tag ${getTagClass(t)}">${t}</span>`).join('')}
            <span class="card-visit">访问 →</span>
          </div>
        </a>`;
      });
      html += `</div></section>`;
    });
  });
  if(!html) html = `<div style="text-align:center;padding:80px 20px;color:var(--text3)"><p style="font-size:2rem;margin-bottom:12px">😔</p><p>没有找到匹配的站点</p></div>`;
  main.innerHTML = html;
  observeSections();
}

// ============ INTERACTIONS ============
function enterSite(){
  document.getElementById('nsfwWarning').classList.add('hidden');
  sessionStorage.setItem('nsfw-ok','1');
}
if(sessionStorage.getItem('nsfw-ok')) document.getElementById('nsfwWarning').classList.add('hidden');

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// Search
let searchTimer;
document.getElementById('searchInput').addEventListener('input', function(){
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>renderContent(this.value.trim()),200);
});

// Scroll animations
function observeSections(){
  const sections = document.querySelectorAll('.category-section');
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')});
  },{threshold:0.05,rootMargin:'0px 0px -40px 0px'});
  sections.forEach(s=>obs.observe(s));
}

// Active sidebar link
function updateActiveSidebar(){
  const sections = document.querySelectorAll('.category-section');
  const links = document.querySelectorAll('.sidebar-link');
  let currentId = '';
  sections.forEach(s=>{
    const rect = s.getBoundingClientRect();
    if(rect.top <= 150) currentId = s.id;
  });
  links.forEach(l=>{
    l.classList.toggle('active', l.getAttribute('href') === '#'+currentId);
  });
}

// Back to top
window.addEventListener('scroll',()=>{
  document.getElementById('backTop').classList.toggle('show',window.scrollY > 600);
  updateActiveSidebar();
});

// Init
renderSidebar();
renderContent();
document.getElementById('totalSites').textContent = totalSites;
document.getElementById('totalCats').textContent = totalCats;
document.getElementById('footSites').textContent = totalSites;
document.getElementById('footCats').textContent = totalCats;
</script>
</body>
</html>
